<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auralis AI - HUD Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* SVG Background for lines */
        .svg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .connection-line {
            stroke: rgba(255, 255, 255, 0.15);
            stroke-width: 1px;
            fill: none;
            animation: pulse-line 4s infinite ease-in-out;
        }

        @keyframes pulse-line {
            0%, 100% { opacity: 0.3; stroke-width: 1px; }
            50% { opacity: 0.7; stroke-width: 1.5px; }
        }

        /* Nodes Container */
        .nodes-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* Base Node Style */
        .node {
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 15px rgba(255, 255, 255, 0.05);
            transition: all 0.5s ease;
            cursor: pointer;
        }

        .node:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.1), 0 0 15px rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
        }

        /* Central Node */
        .node-central {
            width: 180px;
            height: 180px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.1), 0 0 40px rgba(255, 255, 255, 0.2);
            animation: pulse-central 6s infinite ease-in-out, morph 8s infinite ease-in-out;
            z-index: 10;
        }

        .node-central:hover {
            transform: translate(-50%, -50%) scale(1.05);
            box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.2), 0 0 60px rgba(255, 255, 255, 0.4);
        }

        .node-central .title {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .node-central .subtitle {
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-top: 5px;
            text-transform: uppercase;
        }

        /* Secondary Nodes */
        .node-secondary {
            width: 130px;
            height: 130px;
            border-radius: 50% 60% 40% 70% / 60% 40% 70% 30%;
            animation: morph 10s infinite ease-in-out;
            padding: 15px;
        }

        .node-secondary .icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .node-secondary .label {
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 2px;
        }

        .node-secondary .status {
            font-size: 0.6rem;
            font-weight: 400;
            opacity: 0.5;
            letter-spacing: 0.5px;
        }

        /* Minor Nodes */
        .node-minor {
            width: 50px;
            height: 50px;
            border-radius: 40% 70% 50% 60% / 50% 40% 60% 50%;
            animation: morph 7s infinite ease-in-out;
        }

        .node-minor .icon {
            font-size: 1.1rem;
            opacity: 0.7;
        }

        /* Positions for Secondary Nodes (calculated around center) */
        .n-neural { top: 20%; left: 30%; }
        .n-conversations { top: 25%; left: 65%; }
        .n-integration { top: 70%; left: 25%; }
        .n-insights { top: 75%; left: 60%; }
        .n-workflow { top: 45%; left: 15%; }

        /* Positions for Minor Nodes */
        .m-1 { top: 15%; left: 15%; }
        .m-2 { top: 10%; left: 50%; }
        .m-3 { top: 15%; left: 80%; }
        .m-4 { top: 85%; left: 10%; }
        .m-5 { top: 85%; left: 85%; }
        .m-6 { top: 50%; left: 85%; }

        /* Animations */
        @keyframes pulse-central {
            0%, 100% { box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.1), 0 0 40px rgba(255, 255, 255, 0.2); }
            50% { box-shadow: inset 0 0 35px rgba(255, 255, 255, 0.15), 0 0 60px rgba(255, 255, 255, 0.35); }
        }

        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
            25% { border-radius: 40% 60% 50% 70% / 60% 50% 70% 40%; }
            50% { border-radius: 70% 30% 60% 40% / 40% 70% 50% 60%; }
            75% { border-radius: 50% 70% 40% 60% / 70% 40% 60% 50%; }
        }

        /* Floating effect */
        .floating {
            animation: floating 5s infinite ease-in-out;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Specific animation delays to look natural */
        .node:nth-child(2n) { animation-delay: -2s; }
        .node:nth-child(3n) { animation-delay: -4s; }
        .node:nth-child(5n) { animation-delay: -1s; }

        /* Background grid effect */
        .grid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, rgba(0, 0, 0, 0) 70%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: cover, 40px 40px, 40px 40px;
            z-index: 0;
        }

        /* Sidebar for Logs */
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 300px;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 20;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .sidebar-header {
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .log-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse; /* Newest logs at top */
            gap: 15px;
        }

        .log-item {
            background: rgba(255, 255, 255, 0.02);
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .log-role {
            font-size: 0.6rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .role-user { color: rgba(255, 255, 255, 0.6); }
        .role-ai { color: #00F0FF; text-shadow: 0 0 5px rgba(0, 240, 255, 0.5); }

        .log-text {
            font-size: 0.8rem;
            line-height: 1.4;
            color: rgba(255, 255, 255, 0.9);
        }

        .input-container {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .input-container input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 10px;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }

        .input-container input:focus {
            border-color: #00F0FF;
            box-shadow: 0 0 5px rgba(0, 240, 255, 0.3);
        }

        .input-container button {
            background: #00F0FF;
            color: black;
            border: none;
            border-radius: 8px;
            padding: 0 15px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-container button:hover {
            background: #00D8FF;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <!-- Sidebar for Logs -->
    <div class="sidebar">
        <div class="sidebar-header">Auralis Intelligence</div>
        <div class="log-container" id="log-container">
            <!-- Logs will appear here -->
        </div>
        <div class="input-container">
            <input type="text" id="cmd-input" placeholder="Digite um comando...">
            <button id="send-btn">></button>
        </div>
    </div>

    <!-- SVG for connection lines -->
    <svg class="svg-container" id="svg-network">
        <!-- Lines will be generated by JS -->
    </svg>

    <div class="nodes-container">
        <!-- Central Node -->
        <div class="node node-central" id="node-center">
            <div class="title">Auralis AI</div>
            <div class="subtitle">System Active</div>
        </div>

        <!-- Secondary Nodes -->
        <div class="node node-secondary n-neural" id="n-neural" data-command="memory status">
            <div class="icon">🧠</div>
            <div class="label">Neural Hub</div>
            <div class="status">Memory: Active</div>
        </div>

        <div class="node node-secondary n-conversations" id="n-conversations" data-command="show tasks">
            <div class="icon">💬</div>
            <div class="label">Conversations</div>
            <div class="status">AI Status: Ready</div>
        </div>

        <div class="node node-secondary n-integration" id="n-integration" data-command="show insights">
            <div class="icon">⚙️</div>
            <div class="label">Integration</div>
            <div class="status">Connected</div>
        </div>

        <div class="node node-secondary n-insights" id="n-insights" data-command="show insights">
            <div class="icon">📊</div>
            <div class="label">System Insights</div>
            <div class="status">Data Analysis</div>
        </div>

        <div class="node node-secondary n-workflow" id="n-workflow" data-command="show tasks">
            <div class="icon">⏱️</div>
            <div class="label">Workflow</div>
            <div class="status">Reminders Active</div>
        </div>

        <!-- Minor Nodes -->
        <div class="node node-minor m-1" id="m-1"><div class="icon">📁</div></div>
        <div class="node node-minor m-2" id="m-2"><div class="icon">📡</div></div>
        <div class="node node-minor m-3" id="m-3"><div class="icon">🔒</div></div>
        <div class="node node-minor m-4" id="m-4"><div class="icon">🎵</div></div>
        <div class="node node-minor m-5" id="m-5"><div class="icon">💡</div></div>
        <div class="node node-minor m-6" id="m-6"><div class="icon">🌐</div></div>
    </div>

    <script>
        // JS to draw lines between nodes and center
        window.addEventListener('DOMContentLoaded', () => {
            const svg = document.getElementById('svg-network');
            const centerNode = document.getElementById('node-center');
            const secondaryNodes = [
                'n-neural', 'n-conversations', 'n-integration', 
                'n-insights', 'n-workflow',
                'm-1', 'm-2', 'm-3', 'm-4', 'm-5', 'm-6'
            ];

            function drawLines() {
                // Clear existing lines
                svg.innerHTML = '';
                
                const centerRect = centerNode.getBoundingClientRect();
                const centerX = centerRect.left + centerRect.width / 2;
                const centerY = centerRect.top + centerRect.height / 2;

                secondaryNodes.forEach(id => {
                    const node = document.getElementById(id);
                    if (!node) return;
                    
                    const nodeRect = node.getBoundingClientRect();
                    const nodeX = nodeRect.left + nodeRect.width / 2;
                    const nodeY = nodeRect.top + nodeRect.height / 2;

                    // Create curved line using cubic bezier or simple quadratic
                    // For organic feel, we use a slight curve
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    
                    // Control point creates a slight curve
                    const cpX = (centerX + nodeX) / 2;
                    const cpY = (centerY + nodeY) / 2 + (Math.random() * 20 - 10); // slight random deviation

                    const d = `M ${centerX} ${centerY} Q ${cpX} ${cpY} ${nodeX} ${nodeY}`;
                    
                    line.setAttribute('d', d);
                    line.setAttribute('class', 'connection-line');
                    svg.appendChild(line);
                });
            }

            // Draw lines initially
            setTimeout(drawLines, 100);

            // Redraw on resize
            window.addEventListener('resize', drawLines);

            // Add dynamic floating deviation on click for fun
            document.querySelectorAll('.node').forEach(node => {
                node.addEventListener('click', () => {
                    node.style.transform = 'scale(1.15)';
                    setTimeout(() => {
                        node.style.transform = '';
                    }, 300);
                    
                    // Send command to Python if available
                    const cmd = node.getAttribute('data-command');
                    if (cmd) {
                        console.log("CMD:" + cmd);
                    }
                });
            });

            // Communication functions for Python
            window.addLog = function(isUser, text) {
                const container = document.getElementById('log-container');
                const item = document.createElement('div');
                item.className = 'log-item';
                
                const role = document.createElement('div');
                role.className = 'log-role ' + (isUser ? 'role-user' : 'role-ai');
                role.innerText = isUser ? 'VOCÊ' : 'AURALIS';
                
                const content = document.createElement('div');
                content.className = 'log-text';
                content.innerText = text;
                
                item.appendChild(role);
                item.appendChild(content);
                container.appendChild(item);
            };

            window.updateState = function(state) {
                const subtitle = document.querySelector('.node-central .subtitle');
                if (subtitle) {
                    subtitle.innerText = state;
                }
            };

            // Handle input
            const input = document.getElementById('cmd-input');
            const btn = document.getElementById('send-btn');
            
            function sendInput() {
                const text = input.value.trim();
                if (text) {
                    console.log("CMD:" + text);
                    input.value = '';
                }
            }
            
            btn.addEventListener('click', sendInput);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    sendInput();
                }
            });
        });
    </script>
</body>
</html>
