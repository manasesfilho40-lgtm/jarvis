name: Test Plugins

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create config directory
        run: |
          mkdir -p config
          if [ ! -f config/api_keys.json ]; then echo '{"gemini_api_key": "test"}' > config/api_keys.json; fi

      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Check plugin syntax
        run: |
          for f in plugins/*.py; do
            python -c "import py_compile; py_compile.compile('$f', doraise=True)"
            echo "OK: $f"
          done
          echo "All plugin files pass syntax check"